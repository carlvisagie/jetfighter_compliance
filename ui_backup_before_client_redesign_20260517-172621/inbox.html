<!doctype html>
<html>
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>KeepYourContracts.com  Order Inbox</title>
<style>
body{font-family:system-ui,Arial;margin:16px;max-width:1100px}
h2{margin:6px 0 12px}
.badge{padding:2px 6px;border-radius:6px;background:#eef;margin-left:6px}
.ragG{background:#c7f5c4}.ragA{background:#ffe9a9}.ragR{background:#ffb3b3}
.table{width:100%;border-collapse:collapse} td,th{border:1px solid #ddd;padding:6px}
tr:hover{background:#fafafa}
.btn{padding:6px 10px;border-radius:8px;border:1px solid #0a84ff;background:#0a84ff;color:#fff;text-decoration:none;margin-right:6px}
.toast{position:fixed;right:16px;bottom:16px;background:#0a84ff;color:#fff;padding:12px 16px;border-radius:10px;box-shadow:0 4px 12px rgba(0,0,0,.2);display:none}
</style>
</head>
<body>
<div id='kyc-topnav' style='background:#0a84ff;color:#fff;padding:10px;margin:10px;border-radius:10px;'><span style='font-weight:700;'>KeepYourContracts</span><span style='float:right;'><a href='/ui/shop.html' style='color:#fff;margin-right:14px;'>Shop</a><a href='/ui/inquiry.html' style='color:#fff;'>Contact</a></span></div>
<div id='kyc-topnav' style='background:#0a84ff;color:#fff;padding:10px;margin:10px;border-radius:10px;'><span style='font-weight:700;'>KeepYourContracts</span><span style='float:right;'><a href='/ui/shop.html' style='color:#fff;margin-right:14px;'>Shop</a><a href='/ui/inquiry.html' style='color:#fff;'>Contact</a></span></div>
<h2>KeepYourContracts.com  Order Inbox <span id="count" class="badge">0</span></h2>
<table class="table" id="tbl">
  <thead><tr>
    <th>Project</th><th>Phase</th><th>RAG</th><th>Required Open</th><th>Overdue</th><th>Actions</th>
  </tr></thead>
  <tbody></tbody>
</table>
<div id="toast" class="toast">NEW ORDER</div>
<script>
const S = { lastSeen: +localStorage.getItem('lastSeenTs')||0 };
const $ = s=>document.querySelector(s);
function toast(msg){ const t=$('#toast'); t.textContent=msg||'NEW ORDER'; t.style.display='block'; setTimeout(()=>t.style.display='none', 3500); }
function ragCls(r){ return r==='green'?'ragG':(r==='red'?'ragR':'ragA'); }

async function fetchProjects(){ const r=await fetch('/api/projects'); return (await r.json()).projects||[]; }
async function fetchStatus(pid){ const r=await fetch('/api/project/'+pid+'/status'); return (await r.json()).status; }

async function refresh(){
  const projs = await fetchProjects();
  $('#count').textContent = projs.length;
  const body = $('#tbl tbody'); body.innerHTML='';
  let newestTs = S.lastSeen;
  for (const pid of projs.sort()){
    const st = await fetchStatus(pid);
    // track newest by folder mtime via a quick HEAD (skippeduse local timestamp now)
    const ts = Date.now(); if (ts>newestTs) newestTs = ts;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${pid}</td>
      <td>${st.phase}</td>
      <td><span class="badge ${ragCls(st.rag)}">${st.rag}</span></td>
      <td>${st.counts.required_open}</td>
      <td>${st.counts.overdue}</td>
      <td>
        <a class="btn" href="/ui/intake.html" onclick="event.preventDefault(); window.open('/ui/status.html','_blank');">Status</a>
        <a class="btn" href="/api/project/${pid}/export" target="_blank">Export</a>
      </td>`;
    body.appendChild(tr);
  }
  // new order alert
  const prevList = JSON.parse(localStorage.getItem('prevProjects')||'[]');
  const newOnes = projs.filter(p=>!prevList.includes(p));
  if (newOnes.length){ toast('NEW ORDER: '+newOnes[newOnes.length-1]); try{ new AudioContext().resume(); }catch(_){ } }
  localStorage.setItem('prevProjects', JSON.stringify(projs));
  localStorage.setItem('lastSeenTs', String(newestTs));
}

refresh(); setInterval(refresh, 10000);
</script>
</body>
</html>
