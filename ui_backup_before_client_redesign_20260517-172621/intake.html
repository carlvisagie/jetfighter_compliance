<!doctype html>
<html>
<head><meta charset="utf-8"><title>KeepYourContracts.com  Compliance Control Panel</title></head>
<body>
<div id='kyc-topnav' style='background:#0a84ff;color:#fff;padding:10px;margin:10px;border-radius:10px;'><span style='font-weight:700;'>KeepYourContracts</span><span style='float:right;'><a href='/ui/shop.html' style='color:#fff;margin-right:14px;'>Shop</a><a href='/ui/inquiry.html' style='color:#fff;'>Contact</a></span></div>
<div id='kyc-topnav' style='background:#0a84ff;color:#fff;padding:10px;margin:10px;border-radius:10px;'><span style='font-weight:700;'>KeepYourContracts</span><span style='float:right;'><a href='/ui/shop.html' style='color:#fff;margin-right:14px;'>Shop</a><a href='/ui/inquiry.html' style='color:#fff;'>Contact</a></span></div>
  <h2>KeepYourContracts.com  Compliance Control Panel</h2>
  <div style="margin:20px 0;"><b>Scan to continue upload on mobile:</b><br><img src="/ui/assets/kyc_upload_qr.png" width="220" alt="Upload QR Code"></div>
<div style="margin:20px 0;"><b>Scan to continue upload on mobile:</b><br><img src="/ui/assets/kyc_upload_qr.png" width="220" alt="Upload QR Code"></div>
<form id="f">
    <input type="hidden" id="token" name="token" />
    <label>Company Name <input name="company" required></label><br>
    <label>Primary Contact <input name="contact" required></label><br>
    <label>Phone <input name="phone"></label><br>
    <label>Notes <textarea name="notes"></textarea></label><br>
    <fieldset style="margin-top:12px"><legend><b>External Requirements</b></legend>
      <label><input type="checkbox" name="ext_cmmc_l2_c3pao"> CMMC L2 (C3PAO) required</label><br>
      <label><input type="checkbox" name="ext_gs1"> GS1 GTIN/GLN needed</label><br>
      <label><input type="checkbox" name="ext_esign"> DocuSign/Adobe envelopes required</label><br>
      <label><input type="checkbox" name="ext_qes"> Qualified eSignature (eIDAS)</label><br>
      <label><input type="checkbox" name="ext_lab_ce"> Lab tests (CE/EMC/Radio)</label><br>
      <label><input type="checkbox" name="ext_pentest"> External penetration test</label><br>
      <label><input type="checkbox" name="ext_vulnscan"> External vulnerability scans</label><br>
      <label><input type="checkbox" name="ext_iso27001"> ISO 27001 certificate</label><br>
      <label><input type="checkbox" name="ext_soc2"> SOC 2 report</label><br>
      <label><input type="checkbox" name="ext_pci"> PCI DSS (ASV/ROC)</label><br>
      <label><input type="checkbox" name="ext_privacy_counsel"> Privacy/legal counsel</label><br>
      <label><input type="checkbox" name="ext_bg_checks"> Background checks</label><br>
      <label><input type="checkbox" name="ext_worm"> WORM / immutable retention</label><br>
      <label><input type="checkbox" name="ext_translation"> Certified translation</label><br>
      <label><input type="checkbox" name="ext_tsa"> Qualified timestamp / notarization</label><br>
      <label><input type="checkbox" name="ext_lab_substance"> Material tests (RoHS/REACH)</label><br>
    </fieldset>
    <button type="submit">Submit</button>
  </form>
  <script src="/ui/intake.js"></script>
</body>
</html>
