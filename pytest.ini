[pytest]
# Scope test collection to the canonical tests/ tree only.
# The legacy ``organism/`` SQLAlchemy prototype is intentionally excluded —
# it pre-dates organism_core and breaks collection because its smoke
# script imports a sqlite engine at module import time.
testpaths = tests
norecursedirs =
    organism
    organism_core
    data
    drafts
    archive
    backups
    mcps
    terminals
    agent-transcripts
    .git
    .pytest_cache
    __pycache__

filterwarnings =
    ignore::DeprecationWarning
