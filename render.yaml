services:
  - type: web
    name: kyc-backend
    env: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /healthz
    # Persistent disk required for founding beta client paperwork (survives deploys).
    disk:
      name: kyc-data
      mountPath: /var/data
      sizeGB: 10

    envVars:
      - key: ENVIRONMENT
        value: production
      - key: KYC_SAFE_MODE
        value: "false"
      - key: KYC_REQUIRE_SAFE_MODE
        value: "false"
      - key: KYC_ENABLE_MANUAL_ACQUISITION
        value: "true"
      - key: KYC_ENABLE_KNOWLEDGE_OVERLAY
        value: "true"
      - key: KYC_ENABLE_OBSERVABILITY
        value: "true"
      - key: KYC_SCHEDULERS_ENABLED
        value: "true"
      - key: OPS_PASSWORD
        sync: false
      - key: OPS_SECRET
        sync: false
      - key: OPS_API_KEY
        sync: false
      - key: INTAKE_TOKEN_SECRET
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      # Must match disk.mountPath above — founding beta uploads are refused without this.
      - key: KYC_DATA
        value: /var/data
      - key: SMTP_ENABLED
        value: "true"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_SERVER
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        value: KeepYourContracts
      - key: DATABASE_URL
        sync: false
