services:
  # IMPORTANT: This service was created via the Render dashboard, NOT applied from
  # this blueprint. The live service ID is srv-d83gut57vvec739efv6g and is named
  # `jetfighter_compliance` (NOT `kyc-backend`). On 2026-06-04 we discovered the
  # blueprint was never applied — the live service ran without a disk for weeks,
  # silently destroying every upload at each deploy. The kyc-data disk
  # (dsk-d8gj7sog4nts739ng1jg) was attached via API on 2026-06-04T08:14:43Z.
  #
  # Do not "fix" the name mismatch by reapplying this blueprint — that would
  # create a NEW service and lose the now-persistent disk. Manage the live
  # service via API/dashboard until a planned migration moves it under blueprint
  # management. See docs/PRODUCTION_IS_THE_ONLY_TRUTH.md.
  - type: web
    name: kyc-backend
    env: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /healthz
    # Persistent disk for customer paperwork. Mounted on the live service since
    # 2026-06-04T08:14:43Z. Any divergence between this block and the live disk
    # config means uploads will be destroyed on the next deploy.
    disk:
      name: kyc-data
      mountPath: /var/data
      sizeGB: 10

    envVars:
      - key: ENVIRONMENT
        value: production
      - key: KYC_SAFE_MODE
        value: "false"
      - key: KYC_REQUIRE_SAFE_MODE
        value: "false"
      - key: KYC_ENABLE_MANUAL_ACQUISITION
        value: "true"
      - key: KYC_ENABLE_KNOWLEDGE_OVERLAY
        value: "true"
      - key: KYC_ENABLE_OBSERVABILITY
        value: "true"
      - key: KYC_SCHEDULERS_ENABLED
        value: "true"
      # Evidence-intelligence OCR for scanned PDFs and image uploads.
      # Tesseract + poppler binaries are installed by the Dockerfile;
      # this flag is the application-level gate (see
      # services/evidence_intelligence/ocr.py). Off = images and scanned
      # PDFs get metadata-only handling.
      - key: KYC_OCR_ENABLED
        value: "true"
      - key: OPS_PASSWORD
        sync: false
      - key: OPS_SECRET
        sync: false
      - key: OPS_API_KEY
        sync: false
      - key: INTAKE_TOKEN_SECRET
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      # Must match disk.mountPath above — founding pilot uploads are refused without this.
      - key: KYC_DATA
        value: /var/data
      # --- Email: Resend (primary) -------------------------------------------
      # Sign up free at resend.com → API Keys → create key → paste below.
      # Free tier: 3,000 emails/month. No SMTP, no App Passwords, no revocations.
      - key: RESEND_API_KEY
        sync: false
      # Verified sender address for Resend (e.g. noreply@keepyourcontracts.com).
      # Add keepyourcontracts.com in Resend → Domains before using a custom address.
      - key: RESEND_FROM_EMAIL
        value: "KeepYourContracts <noreply@keepyourcontracts.com>"
      # --- Email: SMTP (fallback — only used if RESEND_API_KEY is not set) ---
      - key: SMTP_ENABLED
        value: "true"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_SERVER
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        value: KeepYourContracts
      - key: DATABASE_URL
        sync: false
      # Reddit autonomous posting — register a "script" app at reddit.com/prefs/apps
      - key: REDDIT_CLIENT_ID
        sync: false
      - key: REDDIT_CLIENT_SECRET
        sync: false
      - key: REDDIT_USERNAME
        sync: false
      - key: REDDIT_PASSWORD
        sync: false
