services:
  - type: web
    name: kyc-backend
    env: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /healthz

    envVars:
      - key: ENVIRONMENT
        value: production
      - key: KYC_SAFE_MODE
        value: "true"
      - key: KYC_DEFER_SCHEDULER_SEC
        value: "8"
      - key: OPS_PASSWORD
        sync: false
      - key: OPS_SECRET
        sync: false
      - key: OPS_API_KEY
        sync: false
      - key: INTAKE_TOKEN_SECRET
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: SMTP_ENABLED
        value: "true"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_SERVER
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        value: KeepYourContracts
      - key: DATABASE_URL
        sync: false
