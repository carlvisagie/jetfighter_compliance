services:
  - type: web
    name: kyc-backend
    env: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /healthz
    # Persistent disk required for founding beta client paperwork (survives deploys).
    disk:
      name: kyc-data
      mountPath: /var/data
      sizeGB: 10

    envVars:
      - key: ENVIRONMENT
        value: production
      - key: KYC_SAFE_MODE
        value: "false"
      - key: KYC_REQUIRE_SAFE_MODE
        value: "false"
      - key: KYC_ENABLE_MANUAL_ACQUISITION
        value: "true"
      - key: KYC_ENABLE_KNOWLEDGE_OVERLAY
        value: "true"
      - key: KYC_ENABLE_OBSERVABILITY
        value: "true"
      - key: KYC_SCHEDULERS_ENABLED
        value: "true"
      - key: OPS_PASSWORD
        sync: false
      - key: OPS_SECRET
        sync: false
      - key: OPS_API_KEY
        sync: false
      - key: INTAKE_TOKEN_SECRET
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      # Must match disk.mountPath above — founding beta uploads are refused without this.
      - key: KYC_DATA
        value: /var/data
      # --- Email: Resend (primary) -------------------------------------------
      # Sign up free at resend.com → API Keys → create key → paste below.
      # Free tier: 3,000 emails/month. No SMTP, no App Passwords, no revocations.
      - key: RESEND_API_KEY
        sync: false
      # Verified sender address for Resend (e.g. noreply@keepyourcontracts.com).
      # Add keepyourcontracts.com in Resend → Domains before using a custom address.
      - key: RESEND_FROM_EMAIL
        value: "KeepYourContracts <noreply@keepyourcontracts.com>"
      # --- Email: SMTP (fallback — only used if RESEND_API_KEY is not set) ---
      - key: SMTP_ENABLED
        value: "true"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_SERVER
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        value: KeepYourContracts
      - key: DATABASE_URL
        sync: false
      # Reddit autonomous posting — register a "script" app at reddit.com/prefs/apps
      - key: REDDIT_CLIENT_ID
        sync: false
      - key: REDDIT_CLIENT_SECRET
        sync: false
      - key: REDDIT_USERNAME
        sync: false
      - key: REDDIT_PASSWORD
        sync: false
