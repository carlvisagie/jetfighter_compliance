<!doctype html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>KeepYourContracts  Contact</title>
<style>body{font-family:system-ui,Arial;margin:16px;max-width:800px} label{display:block;margin:.4rem 0} .btn{padding:.6rem .9rem;border-radius:10px;border:1px solid #0a84ff;background:#0a84ff;color:#fff}</style>
</head>
<body>
<div id='kyc-topnav' style='background:#0a84ff;color:#fff;padding:10px;margin:10px;border-radius:10px;'><span style='font-weight:700;'>KeepYourContracts</span><span style='float:right;'><a href='/ui/shop.html' style='color:#fff;margin-right:14px;'>Shop</a><a href='/ui/inquiry.html' style='color:#fff;'>Contact</a></span></div>
<div id='kyc-topnav' style='background:#0a84ff;color:#fff;padding:10px;margin:10px;border-radius:10px;'><span style='font-weight:700;'>KeepYourContracts</span><span style='float:right;'><a href='/ui/shop.html' style='color:#fff;margin-right:14px;'>Shop</a><a href='/ui/inquiry.html' style='color:#fff;'>Contact</a></span></div>
<h2>Contact KeepYourContracts</h2>
<form id="f">
  <label>Your name <input name="name" required></label>
  <label>Your email <input name="email" type="email" required></label>
  <label>Subject <input name="subject" required></label>
  <label>Message <textarea name="message" rows="5" required></textarea></label>
  <button class="btn" type="submit">Send</button>
  <div id="msg"></div>
</form>
<script>
const f=document.getElementById('f'), m=document.getElementById('msg');
f.addEventListener('submit', async (e)=>{
  e.preventDefault();
  const fd=new FormData(f);
  const r=await fetch('/api/inquiry/submit',{method:'POST',body:fd});
  const j=await r.json();
  m.textContent = j.ok ? 'Thanksmessage received.' : ('Error: '+(j.detail||r.status));
  if(j.ok) f.reset();
});
</script>
</body>
</html>
