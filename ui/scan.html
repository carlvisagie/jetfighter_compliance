<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>KeepYourContracts | Scan & Log</title>
  <link rel="stylesheet" href="/ui/assets/styles/design-system.css">
  <link rel="stylesheet" href="/ui/assets/styles/layout.css">
  <link rel="stylesheet" href="/ui/assets/styles/components.css">
  <link rel="stylesheet" href="/ui/assets/styles/ops-dashboard.css">
  <script src="/ui/assets/js/env-ribbon.js" defer></script>
</head>
<body class="kyc-page kyc-surface-ops">
    <header class="kyc-topbar">
    <a class="kyc-brand" href="/ui/shop.html">Keep<span>YourContracts</span></a>
            <nav class="kyc-nav kyc-nav--ops" aria-label="Operations">
            <a href="/ui/control.html">Control</a>
      <a href="/ui/command.html">Command</a>
      <a href="/ui/status.html">Status</a>
      <a href="/ui/inbox.html">Inbox</a>
      <a href="/ui/memory.html">Intelligence</a>
      <a href="/ui/knowledge.html">Knowledge</a>
      <a href="/ui/shop.html">Public site</a>
    </nav>
  </header>


  <div class="kyc-ops-header"><div><h1>Evidence scan & log</h1></div></div>
  <main class="kyc-main kyc-main--ops">
    <div class="card">
      <p class="kyc-status">Tip: Add this page to your phone home screen for one-tap logging.</p>
      <div id="support" class="pill">Detecting camera</div>
      <video id="cam" playsinline muted></video>
      <p id="scanValue"><b>Last code:</b> <span id="code"></span></p>
      <form id="f" class="kyc-form">
        <div class="row">
          <div class="kyc-field"><label>Project<select name="project_id" id="project_id" required></select></label></div>
          <div class="kyc-field"><label>Event Type<select name="event_type" id="event_type">
            <option>RECEIVE</option><option>SHIP</option><option>INSPECT</option><option>ATTEST</option>
            <option>EXCEPTION</option><option>CORRECT</option><option>COMMISSION</option><option>PACK</option>
            <option>TRANSFORM</option><option>DISPOSE</option>
          </select></label></div>
        </div>
        <div class="row">
          <div class="kyc-field"><label>Quantity<input type="number" min="0" step="1" name="qty" id="qty" value="1"></label></div>
          <div class="kyc-field"><label>Address/Location<input type="text" name="address" id="address" placeholder="Dock 3"></label></div>
        </div>
        <div class="kyc-field"><label>Why / Notes<textarea name="why" id="why" rows="3"></textarea></label></div>
        <div class="kyc-btn-row">
          <button type="button" class="btn secondary" id="useCode">Use scanned code as note</button>
          <button type="button" class="btn secondary" id="geo">Use my location</button>
          <button type="submit" class="btn" id="submit">Submit Event</button>
        </div>
        <div id="msg"></div>
      </form>
    </div>
  </main>
  <footer class="kyc-footer">KeepYourContracts.com · Operations</footer>
<script>
  const $ = s => document.querySelector(s);
  const msg = (t, ok=true) => { $('#msg').textContent = t; $('#msg').style.color = ok ? '#0a0' : '#a00'; };

  async function loadProjects(){
    try {
      const r = await fetch('/api/projects'); const j = await r.json();
      const sel = $('#project_id'); sel.innerHTML = (j.projects||[]).map(p=>`<option value="${p}">${p}</option>`).join('');
    } catch(e){ msg('Could not load projects', false); }
  }

  // Camera / Barcode
  let detector, stream, scanning = false, lastCode = '';
  async function startScan(){
    const sup = ('BarcodeDetector' in window);
    $('#support').textContent = sup ? 'Camera scan ready' : 'Scanner unavailable (fallback to manual)';
    if (!sup) return;
    try {
      detector = new BarcodeDetector({formats: ['qr_code','code_128','code_39','ean_13','ean_8']});
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }});
      const video = $('#cam'); video.srcObject = stream; await video.play(); scanning = true;
      requestAnimationFrame(tick);
    } catch(e) { $('#support').textContent = 'Camera permission denied'; }
  }
  async function tick(){
    if(!scanning) return;
    const video = $('#cam');
    try {
      const codes = await detector.detect(video);
      if(codes && codes.length){
        lastCode = codes[0].rawValue || codes[0].rawValue;
        $('#code').textContent = lastCode;
      }
    } catch(e) {}
    requestAnimationFrame(tick);
  }

  // Helpers
  $('#useCode').addEventListener('click', ()=>{
    const w = $('#why'); w.value = (w.value ? (w.value + ' | ') : '') + (lastCode||'NO-CODE');
    msg('Added scanned code to notes.');
  });

  $('#geo').addEventListener('click', ()=>{
    if(!('geolocation' in navigator)) return msg('Geolocation unavailable', false);
    navigator.geolocation.getCurrentPosition(
      pos => { $('#address').value = (pos.coords.latitude.toFixed(5)+','+pos.coords.longitude.toFixed(5)); msg('Location added.'); },
      err => msg('Location blocked or failed', false),
      { enableHighAccuracy:true, timeout:8000, maximumAge:0 }
    );
  });

  // Submit to existing /api/coc/event/form
  $('#f').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const fd = new FormData($('#f'));
    try{
      const r = await fetch('/api/coc/event/form',{method:'POST', body:fd});
      const j = await r.json();
      if(j.ok){ msg('Event saved.'); $('#why').value=''; $('#qty').value=1; }
      else { msg('Error: '+(j.detail||j.error||r.status), false); }
    }catch(err){ msg('Network error', false); }
  });

  loadProjects().then(startScan);
  </script>
  <footer class="kyc-footer">KeepYourContracts.com · Enterprise Compliance Workflow Platform</footer>
</body>
</html>
