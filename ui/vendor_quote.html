<!doctype html>
<html>
<head><meta charset="utf-8"><title>Submit Quote</title></head>
<body>
<div id='kyc-topnav' style='background:#0a84ff;color:#fff;padding:10px;margin:10px;border-radius:10px;'><span style='font-weight:700;'>KeepYourContracts</span><span style='float:right;'><a href='/ui/shop.html' style='color:#fff;margin-right:14px;'>Shop</a><a href='/ui/inquiry.html' style='color:#fff;'>Contact</a></span></div>
<div id='kyc-topnav' style='background:#0a84ff;color:#fff;padding:10px;margin:10px;border-radius:10px;'><span style='font-weight:700;'>KeepYourContracts</span><span style='float:right;'><a href='/ui/shop.html' style='color:#fff;margin-right:14px;'>Shop</a><a href='/ui/inquiry.html' style='color:#fff;'>Contact</a></span></div>
<h2>Submit Quote</h2>
<form id="f">
  <input type="hidden" id="token" name="token" />
  <label>Vendor Name <input name="vendor_name" required></label><br>
  <label>Email <input name="vendor_email" type="email" required></label><br>
  <label>Price (EUR) <input name="price_eur" type="number" min="0" step="0.01" required></label><br>
  <label>Delivery (days) <input name="delivery_days" type="number" min="1" step="1" required></label><br>
  <label><input type="checkbox" name="accreditation"> Accredited / Authorized</label><br>
  <label>Notes <textarea name="notes"></textarea></label><br>
  <button type="submit">Submit Quote</button>
</form>
<script>
(async () => {
  const p = new URLSearchParams(location.search);
  const t = p.get("token")||"";
  document.getElementById("token").value = t;
  document.getElementById("f").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const fd = new FormData(document.getElementById("f"));
    const r = await fetch("/api/rfq/submit", {method:"POST", body:fd});
    const j = await r.json();
    alert(j.ok ? "Quote submitted. Thank you!" : "Error: " + j.error);
  });
})();
</script>
</body>
</html>
