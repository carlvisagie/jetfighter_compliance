<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>System Health</title>
  <style>
    body { font-family: sans-serif; background: #f4f6f8; color: #222; padding: 2em; }
    h1 { color: #2b7a78; }
    pre { background: #e0e0e0; padding: 1em; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>JetFighter Compliance System</h1>
  <p>Status: <span id="status">Loading...</span></p>
  <pre id="json"></pre>
  <script>
    fetch("/healthz").then(r => r.json()).then(data => {
      document.getElementById("status").textContent = data.ok ? "✅ OK" : "❌ Error";
      document.getElementById("json").textContent = JSON.stringify(data, null, 2);
    }).catch(e => {
      document.getElementById("status").textContent = "❌ API Error";
      document.getElementById("json").textContent = e.toString();
    });
  </script>
</body>
</html>
