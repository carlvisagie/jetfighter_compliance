<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KeepYourContracts | Continue onboarding</title>
  <link rel="stylesheet" href="/ui/assets/styles/design-system.css">
  <link rel="stylesheet" href="/ui/assets/styles/layout.css">
  <link rel="stylesheet" href="/ui/assets/styles/components.css">
  <link rel="stylesheet" href="/ui/assets/styles/customer-friction.css">
</head>
<body class="kyc-page kyc-friction">
  <header class="kyc-topbar">
    <a class="kyc-brand" href="/ui/shop.html">Keep<span>YourContracts</span></a>
  </header>
  <main class="kyc-main kyc-main--narrow">
    <section class="kyc-hero">
      <span class="kyc-badge kyc-badge--success">Magic link</span>
      <h1 id="headline">Welcome back</h1>
      <p id="subline">Picking up right where you left off…</p>
    </section>
    <div class="kyc-momentum" id="momentumBar" hidden>
      <div class="kyc-momentum-fill" id="momentumFill"></div>
    </div>
    <article class="kyc-card kyc-card--flat" id="resumeCard">
      <p class="kyc-status" id="status">Loading your progress…</p>
      <div class="kyc-qr-block" id="qrBlock" hidden>
        <h3>Continue on your phone</h3>
        <p>Scan to open this step on mobile — no password needed.</p>
        <img id="qrImg" alt="QR code to continue onboarding" width="200" height="200">
      </div>
      <a class="kyc-btn kyc-btn--primary kyc-btn--block" id="continueBtn" href="#" hidden>Continue</a>
    </article>
  </main>
  <footer class="kyc-footer">KeepYourContracts.com</footer>
  <script src="/ui/assets/js/customer-friction.js"></script>
  <script>
    KYCFriction.initContinuePage();
  </script>
</body>
</html>
