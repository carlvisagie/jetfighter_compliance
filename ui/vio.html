<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>VIO 2.0 — KYC Awareness</title>
  <link rel="stylesheet" href="/ui/assets/styles/vio.css">
</head>
<body class="vio-root" id="vio-root">

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header class="vio-header">
    <div class="vio-brand">
      <span class="vio-brand-mark">◉</span>
      <span class="vio-brand-name">VIO <span class="vio-brand-version">2.0</span></span>
    </div>

    <div class="vio-search-wrap">
      <input
        id="vio-search"
        type="search"
        class="vio-search"
        placeholder="Search companies…"
        autocomplete="off"
        spellcheck="false"
      >
    </div>

    <div class="vio-header-right">
      <div class="vio-health-bar" id="vio-health-bar" aria-label="Organism health">
        <!-- Populated by vio.js -->
      </div>
      <button id="vio-refresh-btn" class="vio-refresh-btn" title="Refresh awareness field">↺ Refresh</button>
      <a href="/ui/control.html" class="vio-cockpit-link" title="Open operator cockpit">⚙ Cockpit</a>
    </div>
  </header>

  <!-- ── Company timelines ──────────────────────────────────────────────── -->
  <main class="vio-stage" id="vio-stage" role="main" aria-label="Company awareness field">
    <div class="vio-loading" id="vio-loading">
      <div class="vio-loading-orb"></div>
      <span>Loading awareness field…</span>
    </div>
  </main>

  <!-- ── Detail panel (slides in from right on node/orb click) ─────────── -->
  <aside
    class="vio-detail-panel"
    id="vio-detail-panel"
    hidden
    role="dialog"
    aria-modal="true"
    aria-label="Company detail"
  >
    <div class="vio-detail-backdrop" id="vio-detail-backdrop"></div>
    <div class="vio-detail-content">
      <button class="vio-detail-close" id="vio-detail-close" aria-label="Close">✕</button>
      <div class="vio-detail-body" id="vio-detail-body"></div>
    </div>
  </aside>

  <script src="/ui/assets/js/vio.js"></script>
</body>
</html>
