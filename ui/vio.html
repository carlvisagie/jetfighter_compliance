<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>VIO — KYC Awareness</title>
  <link rel="stylesheet" href="/ui/assets/styles/vio.css">
</head>
<body class="vio-root" id="vio-root">

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header class="vio-header">
    <div class="vio-brand">
      <span class="vio-brand-mark">◉</span>
      <span class="vio-brand-name">VIO</span>
      <span class="vio-brand-sub">Visual Intelligence Observatory</span>
    </div>

    <div class="vio-search-wrap">
      <input
        id="vio-search"
        type="search"
        class="vio-search"
        placeholder="search company…"
        autocomplete="off"
        spellcheck="false"
      >
    </div>

    <div class="vio-header-right">
      <span class="vio-count" id="vio-count" aria-label="Active companies">—</span>
      <button id="vio-refresh-btn" class="vio-refresh-btn" title="Refresh awareness">↺</button>
      <a href="/ui/control.html" class="vio-cockpit-link" title="Open cockpit">⚙</a>
    </div>
  </header>

  <!-- ── Organism awareness strip (calm baseline; only speaks on deviation) -->
  <section class="vio-organism-strip" id="vio-organism-strip" aria-label="Organism awareness">
    <div class="vio-organism-strip-inner" id="vio-organism-strip-inner">
      <span class="vio-org-pill" data-state="unknown" id="vio-org-pill">…</span>
      <span class="vio-org-text" id="vio-org-bottleneck">listening to the organism…</span>
      <span class="vio-org-sep" aria-hidden="true">·</span>
      <span class="vio-org-text vio-org-action" id="vio-org-action"></span>
      <span class="vio-org-spacer"></span>
      <span class="vio-org-meta" id="vio-org-meta"></span>
    </div>
  </section>

  <!-- ── Stage backbone legend ──────────────────────────────────────────── -->
  <section class="vio-backbone" id="vio-backbone" aria-label="Pipeline backbone">
    <!-- populated by vio.js -->
  </section>

  <!-- ── Company traces (one line per company, urgency-sorted) ──────────── -->
  <main class="vio-stage" id="vio-stage" role="main" aria-label="Company traces">
    <div class="vio-loading" id="vio-loading">
      <div class="vio-loading-orb"></div>
      <span>Reading the field…</span>
    </div>
  </main>

  <!-- ── Hover overlay (Level 1 information surface) ────────────────────── -->
  <div class="vio-hover-card" id="vio-hover-card" hidden role="tooltip"></div>

  <!-- ── Level 2 placeholder (click a company → not yet built) ──────────── -->
  <div class="vio-level2-placeholder" id="vio-level2-placeholder" hidden>
    <div class="vio-level2-card">
      <div class="vio-level2-title">Level 2 — Company Landscape</div>
      <div class="vio-level2-sub" id="vio-level2-sub"></div>
      <p class="vio-level2-body">
        Detailed visual landscape for this company is the next build. For now,
        use the cockpit to drill into the intake.
      </p>
      <div class="vio-level2-actions">
        <a id="vio-level2-cockpit" class="vio-level2-btn" href="/ui/control.html">Open in cockpit →</a>
        <button id="vio-level2-close" class="vio-level2-btn vio-level2-btn-ghost">Close</button>
      </div>
    </div>
  </div>

  <script src="/ui/assets/js/vio.js"></script>
</body>
</html>
