<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>VIO — KYC Awareness</title>
  <link rel="stylesheet" href="/ui/assets/styles/env-ribbon.css">
  <link rel="stylesheet" href="/ui/assets/styles/vio.css">
</head>
<body class="vio-root" id="vio-root">

  <!-- ── Environment ribbon (PRODUCTION_IS_THE_ONLY_TRUTH contract) ──────── -->
  <div id="env-ribbon" class="env-ribbon env-ribbon--unknown" role="status" aria-live="polite">
    <span class="env-ribbon-label">…</span>
    <span class="env-ribbon-meta"></span>
  </div>

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header class="vio-header">
    <div class="vio-brand">
      <span class="vio-brand-mark">◉</span>
      <span class="vio-brand-name">VIO</span>
      <span class="vio-brand-sub">Visual Intelligence Observatory</span>
    </div>

    <div class="vio-search-wrap">
      <input
        id="vio-search"
        type="search"
        class="vio-search"
        placeholder="search company…"
        autocomplete="off"
        spellcheck="false"
      >
    </div>

    <div class="vio-header-right">
      <span class="vio-count" id="vio-count" aria-label="Active companies">—</span>
      <button id="vio-refresh-btn" class="vio-refresh-btn" title="Refresh awareness">↺</button>
      <a href="/ui/control.html" class="vio-cockpit-link" title="Open cockpit">⚙</a>
    </div>
  </header>

  <!-- ── Platform organism orbs (Layer-1 in-place; operator never leaves VIO) ─
       Doctrine: VIO_CONSTITUTION.md "Layer 1 — Organism View" — small number of
       major platform orbs visible from the primary surface. Each orb links to
       its full organ surface; clicking does NOT take the operator out of VIO,
       it surfaces that organ's universe alongside the company traces. -->
  <section class="vio-orbs" id="vio-orbs" aria-label="Platform organism">
    <a class="vio-orb" href="/ui/knowledge.html"  title="Knowledge"><span class="vio-orb-letter">K</span><span class="vio-orb-name">Knowledge</span></a>
    <a class="vio-orb" href="/ui/memory.html"     title="Learning"><span class="vio-orb-letter">L</span><span class="vio-orb-name">Learning</span></a>
    <a class="vio-orb" href="/ui/healthz.html"    title="Observability"><span class="vio-orb-letter">O</span><span class="vio-orb-name">Observ.</span></a>
    <a class="vio-orb" href="/ui/event.html"      title="Evidence"><span class="vio-orb-letter">E</span><span class="vio-orb-name">Evidence</span></a>
    <a class="vio-orb" href="/ui/control.html"    title="Projects"><span class="vio-orb-letter">P</span><span class="vio-orb-name">Projects</span></a>
    <a class="vio-orb" href="/ui/inbox.html"      title="Telemetry"><span class="vio-orb-letter">T</span><span class="vio-orb-name">Telemetry</span></a>
    <span class="vio-orb-arrow" aria-hidden="true">→</span>
    <a class="vio-orb vio-orb--entry" href="/ui/intake.html" title="Upload — entry into the Intake Universe">
      <span class="vio-orb-letter">⬆</span><span class="vio-orb-name">Upload</span>
    </a>
  </section>

  <!-- ── Organism awareness strip (calm baseline; only speaks on deviation) -->
  <section class="vio-organism-strip" id="vio-organism-strip" aria-label="Organism awareness">
    <div class="vio-organism-strip-inner" id="vio-organism-strip-inner">
      <span class="vio-org-pill" data-state="unknown" id="vio-org-pill">…</span>
      <span class="vio-org-text" id="vio-org-bottleneck">listening to the organism…</span>
      <span class="vio-org-sep" aria-hidden="true">·</span>
      <span class="vio-org-text vio-org-action" id="vio-org-action"></span>
      <span class="vio-org-spacer"></span>
      <span class="vio-org-meta" id="vio-org-meta"></span>
    </div>
  </section>

  <!-- ── Stage backbone legend ──────────────────────────────────────────── -->
  <section class="vio-backbone" id="vio-backbone" aria-label="Pipeline backbone">
    <!-- populated by vio.js -->
  </section>

  <!-- ── Company traces (one line per company, urgency-sorted) ──────────── -->
  <main class="vio-stage" id="vio-stage" role="main" aria-label="Company traces">
    <div class="vio-loading" id="vio-loading">
      <div class="vio-loading-orb"></div>
      <span>Reading the field…</span>
    </div>
  </main>

  <!-- ── Hover overlay (Level 1 information surface) ────────────────────── -->
  <div class="vio-hover-card" id="vio-hover-card" hidden role="tooltip"></div>

  <!-- ── Level 2 landscape mount (filled by vio-level2.js on click) ────── -->
  <div class="vio-level2-mount" id="vio-level2-mount" hidden></div>

  <script src="/ui/assets/js/env-ribbon.js"></script>
  <script src="/ui/assets/js/vio-level2.js"></script>
  <script src="/ui/assets/js/vio.js"></script>
</body>
</html>
