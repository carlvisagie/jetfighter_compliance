<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>VIO — KYC Awareness</title>
  <link rel="stylesheet" href="/ui/assets/styles/env-ribbon.css">
  <link rel="stylesheet" href="/ui/assets/styles/vio.css">
</head>
<body class="vio-root" id="vio-root">

  <!--
    ════════════════════════════════════════════════════════════════════════
    DEFENSIVE BOOT — VIO can never go dark again.
    ════════════════════════════════════════════════════════════════════════
    Inlined deliberately (not pulled from /ui/assets/js/) so this layer
    is part of the HTML payload itself. It cannot fail to load and
    cannot be a victim of a parse error in some other file. Plain ES5
    only — no template literals, no const/let, no arrow functions —
    because the entire point of this script is to be the safety net
    when the rest fails.

    Backstory: 2026-06-04 "We need VIO connected" incident.
    A duplicate `const idx` declaration in vio-level2.js (loaded BEFORE
    vio.js in the script list) caused a SyntaxError at parse time. The
    browser silently refused to run vio-level2.js, and because vio.js
    depended on globals from that file, vio.js's render path also
    failed silently. Result: operator opened /ui/vio.html and saw only
    the env-ribbon banner — the entire awareness field never painted,
    with zero diagnostic. VIO violated its only contract (the operator's
    eyes) for an unknown number of deploys.

    Contract enforced by this script:
      1. A visible boot surface paints synchronously before any other
         script runs. The operator NEVER sees a black void.
      2. Any uncaught error (sync or async) is captured and rendered
         onto the boot surface in human-readable form.
      3. If VIO_BOOT.ready() is not called within 2 seconds, the boot
         surface updates to "still initialising…".
      4. If VIO_BOOT.ready() is not called within 10 seconds AND no
         errors were captured, the boot surface flips to a hard
         "VIO failed to boot" state with the captured diagnostics.
      5. Any successful render path in vio.js calls VIO_BOOT.ready()
         which tears the boot surface down — the only path to a clean
         operator view.
  -->
  <script>
    (function () {
      'use strict';

      var BOOT_ID  = 'vio-boot';
      var MARK_ID  = 'vio-boot-mark';
      var LINE_ID  = 'vio-boot-line';
      var DIAG_ID  = 'vio-boot-diagnostic';
      var errors   = [];
      var bootedAt = (new Date()).getTime();

      function bootHtml() {
        return '' +
          '<div id="' + BOOT_ID + '" role="status" aria-live="polite"' +
          '  style="position:fixed;top:0;left:0;right:0;bottom:0;' +
          '  background:#07070d;color:#e6e8ef;display:flex;flex-direction:column;' +
          '  align-items:center;justify-content:center;text-align:center;padding:24px;' +
          '  z-index:99998;' +
          '  font:13px/1.4 ui-sans-serif,system-ui,-apple-system,&quot;Segoe UI&quot;,Roboto,sans-serif;">' +
          '  <div id="' + MARK_ID + '"' +
          '    style="font-size:32px;color:#4dc4d6;letter-spacing:0.12em;' +
          '    margin-bottom:18px;font-weight:600;' +
          '    animation:vio-boot-pulse 1.8s ease-in-out infinite;">◉ VIO</div>' +
          '  <div id="' + LINE_ID + '"' +
          '    style="color:#7d8190;font-size:11px;letter-spacing:0.08em;' +
          '    text-transform:uppercase;">initialising…</div>' +
          '  <div id="' + DIAG_ID + '"' +
          '    style="max-width:640px;margin-top:24px;padding:14px 16px;' +
          '    color:#d8a24a;background:#0c0c16;border:1px solid #d8a24a;' +
          '    border-radius:4px;font-size:11px;line-height:1.6;' +
          '    text-align:left;display:none;white-space:pre-wrap;' +
          '    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;"></div>' +
          '  <style>@keyframes vio-boot-pulse{0%,100%{opacity:0.55}50%{opacity:1}}</style>' +
          '</div>';
      }

      function paint() {
        if (document.getElementById(BOOT_ID)) return;
        if (!document.body) return;
        document.body.insertAdjacentHTML('afterbegin', bootHtml());
      }

      function setLine(text, color) {
        var line = document.getElementById(LINE_ID);
        if (!line) return;
        line.textContent = text;
        if (color) line.style.color = color;
      }

      function showDiag() {
        var diag = document.getElementById(DIAG_ID);
        if (!diag) return;
        diag.style.display = 'block';
        var rows = [];
        for (var i = 0; i < errors.length; i++) {
          var e = errors[i];
          rows.push('[' + e.at + ']  ' + e.where + '\n  ' + e.message);
        }
        rows.push('');
        rows.push('Open DevTools (F12) → Console for stack traces.');
        rows.push('Hard-refresh (Ctrl+Shift+R) to bypass any cached bad JS.');
        diag.textContent = rows.join('\n');
      }

      function fault(where, message) {
        errors.push({
          where:   String(where || 'unknown'),
          message: String(message == null ? '(no message)' : message).slice(0, 600),
          at:      (new Date()).toISOString()
        });
        setLine('VIO FAILED TO BOOT', '#ef4444');
        showDiag();
        var mark = document.getElementById(MARK_ID);
        if (mark) {
          mark.style.animation = 'none';
          mark.style.color = '#ef4444';
        }
      }

      // Public API for the rest of VIO.
      window.VIO_BOOT = {
        ready: function () {
          var el = document.getElementById(BOOT_ID);
          if (el && el.parentNode) el.parentNode.removeChild(el);
        },
        progress: function (text) {
          setLine(text);
        },
        fault: fault,
        elapsed: function () {
          return (new Date()).getTime() - bootedAt;
        },
        errors: function () {
          return errors.slice();
        }
      };

      // Global error trap — anything that escapes try/catch in any
      // script lands here and becomes visible to the operator.
      window.addEventListener('error', function (e) {
        var src = e.filename ? String(e.filename).split('/').pop() : 'inline';
        var loc = src + (e.lineno ? (':' + e.lineno) : '');
        var msg = e.message || (e.error && e.error.message) || String(e.error || e);
        fault('uncaught:' + loc, msg);
      });
      window.addEventListener('unhandledrejection', function (e) {
        var r = e.reason;
        var msg = (r && r.message) ? r.message : String(r);
        fault('unhandled-promise', msg);
      });

      // Paint as soon as body is available.
      if (document.body) {
        paint();
      } else {
        document.addEventListener('DOMContentLoaded', paint);
      }

      // Soft watchdog: 2 seconds in, if VIO hasn't called ready(),
      // gently tell the operator we're still working.
      setTimeout(function () {
        if (document.getElementById(BOOT_ID)) {
          setLine('still initialising — fetching the field…');
        }
      }, 2000);

      // Hard watchdog: 10 seconds in, if STILL not ready AND no errors
      // were captured, surface a "did not complete first render"
      // diagnostic. This catches the slow-API and the silent-no-render
      // failure modes that error handlers can't see.
      setTimeout(function () {
        if (!document.getElementById(BOOT_ID)) return;
        if (errors.length === 0) {
          fault('boot-timeout',
            'VIO did not complete first render within 10 seconds. ' +
            'Most likely the /api/operator/vio/overview call hung, or ' +
            'a render path never called window.VIO_BOOT.ready(). ' +
            'Network tab will show the actual API status.');
        }
      }, 10000);
    })();
  </script>

  <!-- ── Environment ribbon (PRODUCTION_IS_THE_ONLY_TRUTH contract) ──────── -->
  <div id="env-ribbon" class="env-ribbon env-ribbon--unknown" role="status" aria-live="polite">
    <span class="env-ribbon-label">…</span>
    <span class="env-ribbon-meta"></span>
  </div>

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header class="vio-header">
    <div class="vio-brand">
      <span class="vio-brand-mark">◉</span>
      <span class="vio-brand-name">VIO</span>
      <span class="vio-brand-sub">Visual Intelligence Observatory</span>
    </div>

    <div class="vio-search-wrap">
      <input
        id="vio-search"
        type="search"
        class="vio-search"
        placeholder="search company…"
        autocomplete="off"
        spellcheck="false"
      >
    </div>

    <div class="vio-header-right">
      <span class="vio-count" id="vio-count" aria-label="Active companies">—</span>
      <button id="vio-refresh-btn" class="vio-refresh-btn" title="Refresh awareness">↺</button>
      <a href="/ui/control.html" class="vio-cockpit-link" title="Open cockpit">⚙</a>
    </div>
  </header>

  <!-- ── Platform organism orbs (Layer-1 in-place; operator never leaves VIO) ─
       Doctrine: VIO_CONSTITUTION.md "Layer 1 — Organism View" — small number of
       major platform orbs visible from the primary surface. Each orb links to
       its full organ surface; clicking does NOT take the operator out of VIO,
       it surfaces that organ's universe alongside the company traces. -->
  <section class="vio-orbs" id="vio-orbs" aria-label="Platform organism">
    <a class="vio-orb" href="/ui/knowledge.html"  title="Knowledge"><span class="vio-orb-letter">K</span><span class="vio-orb-name">Knowledge</span></a>
    <a class="vio-orb" href="/ui/memory.html"     title="Learning"><span class="vio-orb-letter">L</span><span class="vio-orb-name">Learning</span></a>
    <a class="vio-orb" href="/ui/healthz.html"    title="Observability"><span class="vio-orb-letter">O</span><span class="vio-orb-name">Observ.</span></a>
    <a class="vio-orb" href="/ui/event.html"      title="Evidence"><span class="vio-orb-letter">E</span><span class="vio-orb-name">Evidence</span></a>
    <a class="vio-orb" href="/ui/control.html"    title="Projects"><span class="vio-orb-letter">P</span><span class="vio-orb-name">Projects</span></a>
    <a class="vio-orb" href="/ui/inbox.html"      title="Telemetry"><span class="vio-orb-letter">T</span><span class="vio-orb-name">Telemetry</span></a>
    <span class="vio-orb-arrow" aria-hidden="true">→</span>
    <a class="vio-orb vio-orb--entry" href="/ui/intake.html" title="Upload — entry into the Intake Universe">
      <span class="vio-orb-letter">⬆</span><span class="vio-orb-name">Upload</span>
    </a>
  </section>

  <!-- ── Organism awareness strip (calm baseline; only speaks on deviation) -->
  <section class="vio-organism-strip" id="vio-organism-strip" aria-label="Organism awareness">
    <div class="vio-organism-strip-inner" id="vio-organism-strip-inner">
      <span class="vio-org-pill" data-state="unknown" id="vio-org-pill">…</span>
      <span class="vio-org-text" id="vio-org-bottleneck">listening to the organism…</span>
      <span class="vio-org-sep" aria-hidden="true">·</span>
      <span class="vio-org-text vio-org-action" id="vio-org-action"></span>
      <span class="vio-org-spacer"></span>
      <span class="vio-org-meta" id="vio-org-meta"></span>
    </div>
  </section>

  <!-- ── Stage backbone legend ──────────────────────────────────────────── -->
  <section class="vio-backbone" id="vio-backbone" aria-label="Pipeline backbone">
    <!-- populated by vio.js -->
  </section>

  <!-- ── Company traces (one line per company, urgency-sorted) ──────────── -->
  <main class="vio-stage" id="vio-stage" role="main" aria-label="Company traces">
    <div class="vio-loading" id="vio-loading">
      <div class="vio-loading-orb"></div>
      <span>Reading the field…</span>
    </div>
  </main>

  <!-- ── Hover overlay (Level 1 information surface) ────────────────────── -->
  <div class="vio-hover-card" id="vio-hover-card" hidden role="tooltip"></div>

  <!-- ── Level 2 landscape mount (filled by vio-level2.js on click) ────── -->
  <div class="vio-level2-mount" id="vio-level2-mount" hidden></div>

  <script src="/ui/assets/js/env-ribbon.js"></script>
  <script src="/ui/assets/js/vio-level2.js"></script>
  <script src="/ui/assets/js/vio.js"></script>
</body>
</html>
