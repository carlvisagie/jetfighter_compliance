<!doctype html>
<html>
<head><meta charset="utf-8"><title>KeepYourContracts.com  Compliance Control Panel</title>
<style>
body{font-family:system-ui,Arial;margin:20px}
.badge{padding:2px 6px;border-radius:4px}
.green{background:#c7f5c4}.amber{background:#ffe9a9}.red{background:#ffb3b3}
table{border-collapse:collapse;width:100%}th,td{border:1px solid #ddd;padding:8px}
tr:hover{background:#f7f7f7}
</style>
</head>
<body>
<div id='kyc-topnav' style='background:#0a84ff;color:#fff;padding:10px;margin:10px;border-radius:10px;'><span style='font-weight:700;'>KeepYourContracts</span><span style='float:right;'><a href='/ui/shop.html' style='color:#fff;margin-right:14px;'>Shop</a><a href='/ui/inquiry.html' style='color:#fff;'>Contact</a></span></div>
<div id='kyc-topnav' style='background:#0a84ff;color:#fff;padding:10px;margin:10px;border-radius:10px;'><span style='font-weight:700;'>KeepYourContracts</span><span style='float:right;'><a href='/ui/shop.html' style='color:#fff;margin-right:14px;'>Shop</a><a href='/ui/inquiry.html' style='color:#fff;'>Contact</a></span></div>
<h2>KeepYourContracts.com  Compliance Control Panel</h2>
<div id="list">Loading...</div>
<hr/>
<h3>Project Detail</h3>
<div id="detail"></div>
<script>
async function api(p,opts){ const r=await fetch(p,opts||{}); return r.json() }
function badge(c){ return `<span class="badge ${c}">${c}</span>` }
async function load(){
  const l = await api('/api/projects'); const list = document.getElementById('list');
  if(!l.ok || !l.projects.length){ list.innerHTML='No projects yet.'; return }
  list.innerHTML = '<ul>' + l.projects.map(p=>`<li><a href="#" onclick="show('${p}')">${p}</a></li>`).join('') + '</ul>';
}
async function show(pid){
  const d = await api(`/api/project/${pid}/status`);
  const s = d.status; const det = document.getElementById('detail');
  det.innerHTML = `<p><b>${pid}</b>  Phase: ${s.phase}  RAG: ${badge(s.rag)} <span id="ecost" class="badge amber">External Costs: checking...</span></p>
  <table><tr><th>Step</th><th>Required</th><th>Status</th><th>Due</th><th>Action</th></tr>
    ${s.steps.map(x=>`<tr><td>${x.title}</td><td>${x.required?'Yes':'No'}</td><td>${x.status}</td><td>${x.due_utc||''}</td>
      <td>${x.status==='todo'?`<button onclick="advance('${pid}','${x.id}')">Mark Done</button>`:''}</td></tr>`).join('')}
  </table><div id="vendors"></div><div id="rfq"></div>`;
  const c = await api(`/api/project/${pid}/costs`);
  const tag = document.getElementById('ecost');
  if (c.costs && c.costs.requires_external){
    tag.className = 'badge red';
    const list = c.costs.items.map(i=>`${i.title}`).join(', ');
    tag.textContent = `External Costs: ${list} (${Math.round(c.costs.sum_min_eur)}${Math.round(c.costs.sum_max_eur)})`;
    const blocks = await Promise.all(c.costs.items.map(async it=>{
      const v = await api(`/api/vendors?category=${it.code}`);
      if(!v.vendors || !v.vendors.length) return '';
      return `<h4>Vendor Suggestions  ${it.title}</h4><ul>` + v.vendors.map(x=>`<li><a target="_blank" href="${x.url}">${x.name}</a> <em>(${x.type})</em>  ${x.notes||''}</li>`).join('') + `</ul>`;
    }));
    document.getElementById('vendors').innerHTML = blocks.join('');
  } else {
    tag.className = 'badge green';
    tag.textContent = 'External Costs: 0';
    document.getElementById('vendors').innerHTML = '';
  }
  document.getElementById("rfq").innerHTML = `<p><button onclick="launchRFQ('${pid}')">Launch RFQ for this need</button></p>`;
}
async function advance(pid, sid){
  await api(`/api/project/${pid}/advance`, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({step_id:sid})});
  show(pid);
}
async function launchRFQ(pid){
  const cat = prompt('Category code (e.g., gs1, cmmc_l2_c3pao, pentest, lab_ce):','gs1'); if(!cat) return;
  const v = await api('/api/vendors?category='+encodeURIComponent(cat));
  const invitees = (v.vendors||[]).filter(x=>x.url).slice(0,5).map(x=>({name:x.name, email:'', url:x.url}));
  const body = {project_id:pid, category:cat, title:`RFQ for ${cat.toUpperCase()}`, spec:{}, invitees:invitees};
  const r = await fetch('/api/rfq/create',{method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
  const j = await r.json(); alert(j.ok? 'RFQ created: '+j.rfq_id : 'Error: '+j.error);
}
load();
</script>
</body>
</html>
